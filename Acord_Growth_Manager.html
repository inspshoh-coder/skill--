<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Acord 成長ログ</title>

<style>

body{
    font-family:sans-serif;
    text-align:center;
    padding:20px;
}

.box{
    border:1px solid #ccc;
    border-radius:10px;
    padding:15px;
    margin:15px;
}

input,textarea{
    width:80%;
    padding:8px;
    margin:5px;
}

textarea{
    height:80px;
}

button{
    padding:10px 20px;
    margin:5px;
}

.log{
    text-align:left;
    border:1px solid #ddd;
    border-radius:10px;
    padding:10px;
    margin:10px;
}

</style>

</head>


<body>


<h1>Acord 成長ログ（仮）</h1>


<div class="box">

<h2>目標設定</h2>


<p>目標</p>
<input id="goal" value="100000S達成">


<p>必要ポイント</p>
<input id="point" value="500000">


<p>期限（日数）</p>
<input id="days" value="30">


<p>現在ポイント</p>
<input id="currentPoint" value="0">

<p>
あと必要：
<span id="remainingPoint">0</span>
ポイント
</p>


<p>
1日必要ポイント：
<span id="daily">0</span>
</p>


</div>



<div class="box">

<h2>今日の記録</h2>


<p>今日貯めたポイント</p>

<input id="todayPoint" value="0">


<p>メモ</p>

<textarea id="memo"></textarea>


<br>

<button onclick="saveLog()">
記録する
</button>


</div>




<div class="box">

<h2>成長履歴</h2>

<button onclick="exportCSV()">
CSV出力
</button>

<div id="logs"></div>

</div>




<script>


let logs =
JSON.parse(localStorage.getItem("acordLogs"))
|| [];



updateDaily();

displayLogs();



document
.getElementById("point")
.addEventListener(
"input",
updateDaily
);


document
.getElementById("days")
.addEventListener(
"input",
updateDaily
);

document
.getElementById("currentPoint")
.addEventListener(
"input",
updateDaily
);



function updateDaily(){

let point =
Number(document.getElementById("point").value);

let days =
Number(document.getElementById("days").value);

let current =
Number(document.getElementById("currentPoint").value);


// あと必要ポイント
let remaining =
point - current;


if(remaining < 0){
    remaining = 0;
}


document.getElementById("remainingPoint")
.textContent =
remaining;


// 残りから1日必要ポイント計算
let daily =
Math.ceil(remaining / days);


document.getElementById("daily")
.textContent =
daily;

}



function saveLog(){


let log={

date:
new Date().toLocaleDateString(),

goal:
document.getElementById("goal").value,

todayPoint:
Number(
document.getElementById("todayPoint").value
),

memo:
document.getElementById("memo").value

};



logs.push(log);



localStorage.setItem(
"acordLogs",
JSON.stringify(logs)
);



displayLogs();


}





function displayLogs(){


let area =
document.getElementById("logs");


area.innerHTML="";



logs.forEach((l,index)=>{


area.innerHTML += `

<div class="log">

<p>
📅 ${l.date}
</p>

<p>
🎯目標：
${l.goal}
</p>

<p>
💰今日：
${l.todayPoint}
ポイント
</p>


<p>
📝${l.memo}
</p>


<button onclick="deleteLog(${index})">
削除
</button>


</div>

`;



});


}



function deleteLog(index){

logs.splice(index,1);


localStorage.setItem(
"acordLogs",
JSON.stringify(logs)
);


displayLogs();


}


function exportCSV(){

let csv =
"日付,目標,今日ポイント,メモ\n";


logs.forEach((l)=>{

csv +=
`${l.date},${l.goal},${l.todayPoint},${l.memo}\n`;

});


let blob =
new Blob(
[csv],
{type:"text/csv"}
);


let link =
document.createElement("a");


link.href =
URL.createObjectURL(blob);


link.download =
"Acord_log.csv";


link.click();

}
</script>


</body>
</html>
